[server]
host = "0.0.0.0"
port = 8002
secret = "changeme"  # overridden by VEIL_SECRET env var

[chat]
max_messages = 20
fade_timeout = 20    # seconds before a message fades, 0 = never
position = "bottom-right"

[discord]
voice_channel_id = ""
max_members = 8

[alerts]
width = 600
height = 300
x = 0
y = 0
queue_max = 10
audio_volume = 0.4   # 0.0–1.0; keep alerts at background noise level

[alerts.sub]
duration = 5

[alerts.resub]
duration = 5

[alerts.giftsub]
duration = 5

[alerts.giftbomb]
duration = 5

[alerts.raid]
duration = 5

[alerts.bits]
duration = 5

[alerts.channel_point]
duration = 5
cooldown_s = 30

[alerts.follower]
duration = 5
cooldown_s = 10

[scenes]
default = "brb"

[obs]
host = "localhost"
port = 4455
password = ""  # overridden by OBS_WS_PASSWORD env var
