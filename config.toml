[server]
host = "0.0.0.0"
port = 8002
secret = "changeme"  # overridden by VEIL_SECRET env var

[chat]
max_messages = 20
fade_timeout = 0    # seconds before a message fades, 0 = never
position = "bottom-right"

[discord]
voice_channel_id = ""
max_members = 8

[alerts]
width = 600
height = 300
x = 0
y = 0
queue_max = 10
audio_volume = 0.4   # 0.0–1.0; keep alerts at background noise level

[alerts.sub]
audio = "media/audio/sub.mp3"
duration = 5

[alerts.resub]
audio = "media/audio/sub.mp3"
duration = 5

[alerts.giftsub]
