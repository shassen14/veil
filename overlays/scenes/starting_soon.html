<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      font-family: "Share Tech Mono", "Courier New", monospace;
      color: #00ff41;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0, 0, 0, 0.12) 2px, rgba(0, 0, 0, 0.12) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .container { text-align: center; }

    .label {
      font-size: 13px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 18px;
    }

    .title {
      font-size: 76px;
      letter-spacing: 0.1em;
      text-shadow:
        0 0 30px rgba(0, 255, 65, 0.55),
        0 0 70px rgba(0, 255, 65, 0.25);
      animation: glow 3s ease-in-out infinite;
    }

    .cursor {
      display: inline-block;
      width: 4px;
      height: 0.85em;
      background: #00ff41;
      margin-left: 10px;
      vertical-align: middle;
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.8);
      animation: blink 1s step-end infinite;
    }

    .clock {
      margin-top: 28px;
      font-size: 24px;
      letter-spacing: 0.25em;
      opacity: 0.55;
    }

    .bar-wrap {
      margin: 36px auto 0;
      width: 340px;
      height: 2px;
      background: rgba(0, 255, 65, 0.12);
      position: relative;
      overflow: hidden;
    }

    .bar-wrap::after {
      content: "";
      position: absolute;
      left: -50%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, #00ff41, transparent);
      animation: sweep 2.2s linear infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 30px rgba(0,255,65,0.55), 0 0 70px rgba(0,255,65,0.25); }
      50%       { text-shadow: 0 0 50px rgba(0,255,65,0.85), 0 0 100px rgba(0,255,65,0.4); }
    }
    @keyframes sweep { to { left: 100%; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">stream</div>
    <div class="title">STARTING SOON<span class="cursor"></span></div>
    <div class="clock" id="clock"></div>
    <div class="bar-wrap"></div>
  </div>
  <script>
    function tick() {
      const d = new Date();
      const h = String(d.getHours()).padStart(2, "0");
      const m = String(d.getMinutes()).padStart(2, "0");
      const s = String(d.getSeconds()).padStart(2, "0");
      document.getElementById("clock").textContent = `${h}:${m}:${s}`;
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
