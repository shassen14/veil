<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/overlays/static/css/tokens.css" />
    <link rel="stylesheet" href="/overlays/static/css/base.css" />
    <link rel="stylesheet" href="/overlays/static/css/scene.css" />
    <style>
      :root {
        --font-label: 30px;
        --font-title: 76px;
        --font-clock: 36px;
        --font-chat: 28px;
        --font-stat-label: 18px;
        --font-stat-value: 28px;
        --stats-bar-h: 72px;
      }

      .title { animation: glow 3s ease-in-out infinite; }

      .cursor { vertical-align: baseline; }

      .clock {
        margin-top: 28px;
        font-size: var(--font-clock);
        letter-spacing: 0.25em;
        opacity: 0.55;
      }

      .bar-wrap {
        margin: 36px auto 0;
        width: 340px;
        height: 2px;
        background: rgba(var(--color-rgb), 0.12);
        position: relative;
        overflow: hidden;
      }

      .bar-wrap::after {
        content: "";
        position: absolute;
        left: -50%;
        width: 50%;
        height: 100%;
        background: linear-gradient(to right, transparent, var(--color), transparent);
        animation: sweep 2.2s linear infinite;
      }

      /* floating chat — no panel, messages over the scene */
      #chat {
        position: fixed;
        bottom: var(--stats-bar-h);
        right: 28px;
        width: 400px;
        max-height: 42%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 5px;
        overflow: hidden;
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 8%);
        mask-image: linear-gradient(to bottom, transparent 0%, black 8%);
      }

      .msg {
        font-size: var(--font-chat);
        color: #d8d8d8;
        line-height: 1.5;
        word-break: break-word;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.95), 0 0 18px rgba(0, 0, 0, 0.7);
        animation: fadeIn 0.2s ease;
      }

      .msg .author      { margin-right: 5px; }

      .msg .source-icon {
        width: 18px;
        height: 18px;
        vertical-align: middle;
        margin-right: 5px;
        opacity: 0.8;
      }

      .msg .emote {
        display: inline-block;
        height: var(--font-chat);
        width: auto;
        vertical-align: middle;
        margin: 0 2px;
      }

      .stats-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: var(--stats-bar-h);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 72px;
        border-top: 1px solid rgba(var(--color-rgb), 0.1);
        background: rgba(0, 0, 0, 0.35);
      }

      .stat {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .stat-value {
        letter-spacing: 0.06em;
        text-shadow: 0 0 10px rgba(var(--color-rgb), 0.4);
      }

      .container  { position: relative; z-index: 2; }
      #chat       { z-index: 2; }
      .stats-bar  { z-index: 2; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="label">stream</div>
      <div class="title">STARTING SOON<span class="cursor"></span></div>
      <div class="clock" id="clock"></div>
      <div class="bar-wrap"></div>
    </div>

    <div id="chat"></div>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">last follower</span>
        <span class="stat-value empty" id="last-follower">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">last sub</span>
        <span class="stat-value empty" id="last-sub">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">last raider</span>
        <span class="stat-value empty" id="last-raider">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">last cheer</span>
        <span class="stat-value empty" id="last-bits">—</span>
      </div>
    </div>

    <script src="/overlays/static/js/rain.js"></script>
    <script src="/overlays/static/js/veil.js"></script>
    <script src="/overlays/static/js/chat.js"></script>
    <script src="/overlays/static/js/stats.js"></script>
    <script>
      function tick() {
        const d = new Date();
        const h = String(d.getHours()).padStart(2, "0");
        const m = String(d.getMinutes()).padStart(2, "0");
        const s = String(d.getSeconds()).padStart(2, "0");
        document.getElementById("clock").textContent = `${h}:${m}:${s}`;
      }
      tick();
      setInterval(tick, 1000);

      const chatEl = document.getElementById("chat");
      const chat = createChatManager(chatEl, { disableFade: true });

      createVeilSocket({
        "state.sync": (data) => {
          applyEmotes(data.emote_map);
          applyViewerStats(data);
          if (data.config) chat.applyConfig(data.config);
        },
        "config.update":          (data) => chat.applyConfig(data),
        "emotes.update":          (data) => applyEmotes(data),
        "chat.message":           (data) => { feedRain(); chat.addMessage(data); },
        "chat.message.delete":    (data) => chat.deleteMessage(data.message_id),
        "chat.clear_user":        (data) => chat.clearUserMessages(data.username),
        "viewer_stats.update":    (data) => applyViewerStats(data),
        "viewer_stats.bootstrap": (data) => applyViewerStats(data),
      });
    </script>
  </body>
</html>
