<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/overlays/static/css/tokens.css" />
    <link rel="stylesheet" href="/overlays/static/css/base.css" />
    <link rel="stylesheet" href="/overlays/static/css/scene.css" />
    <style>
      :root {
        --font-label: 30px;
        --font-title: 68px;
        --font-subtitle: 20px;
        --font-stat-label: 18px;
        --font-stat-value: 28px;
      }

      .title {
        line-height: 1.2;
        animation: glow 4s ease-in-out infinite;
      }

      .divider {
        margin: 30px auto;
        width: 200px;
        height: 1px;
        background: rgba(var(--color-rgb), 0.25);
      }

      .stats {
        margin-top: 40px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }

      .stat-row {
        display: flex;
        align-items: baseline;
        gap: 16px;
      }

      .stat-label { width: 130px; text-align: right; }

      .stat-value {
        letter-spacing: 0.08em;
        text-shadow: 0 0 12px rgba(var(--color-rgb), 0.45);
      }

      .stat-value.empty { opacity: 0.15; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="label">stream ending</div>
      <div class="title">THANKS FOR<br />WATCHING</div>
      <div class="divider"></div>
      <div class="subtitle">see you next time</div>
      <div class="stats">
        <div class="stat-row">
          <span class="stat-label">last follower</span>
          <span class="stat-value empty" id="last-follower">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">last sub</span>
          <span class="stat-value empty" id="last-sub">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">most loyal sub</span>
          <span class="stat-value empty" id="longest-sub">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">last raider</span>
          <span class="stat-value empty" id="last-raider">—</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">last cheer</span>
          <span class="stat-value empty" id="last-bits">—</span>
        </div>
      </div>
    </div>

    <script src="/overlays/static/js/veil.js"></script>
    <script src="/overlays/static/js/stats.js"></script>
    <script>
      createVeilSocket({
        "state.sync":             (data) => applyViewerStats(data),
        "viewer_stats.update":    (data) => applyViewerStats(data),
        "viewer_stats.bootstrap": (data) => applyViewerStats(data),
      });
    </script>
  </body>
</html>
