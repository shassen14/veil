<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      font-family: "Share Tech Mono", "Courier New", monospace;
      color: #00ff41;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0, 0, 0, 0.12) 2px, rgba(0, 0, 0, 0.12) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .container { text-align: center; }

    .label {
      font-size: 13px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 18px;
    }

    .title {
      font-size: 68px;
      letter-spacing: 0.1em;
      line-height: 1.2;
      text-shadow:
        0 0 30px rgba(0, 255, 65, 0.55),
        0 0 70px rgba(0, 255, 65, 0.25);
      animation: glow 4s ease-in-out infinite;
    }

    .divider {
      margin: 30px auto;
      width: 200px;
      height: 1px;
      background: rgba(0, 255, 65, 0.25);
    }

    .subtitle {
      font-size: 16px;
      letter-spacing: 0.35em;
      opacity: 0.4;
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 30px rgba(0,255,65,0.55), 0 0 70px rgba(0,255,65,0.25); }
      50%       { text-shadow: 0 0 50px rgba(0,255,65,0.8),  0 0 100px rgba(0,255,65,0.4); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">stream ending</div>
    <div class="title">THANKS FOR<br>WATCHING</div>
    <div class="divider"></div>
    <div class="subtitle">see you next time</div>
  </div>
</body>
</html>
