<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/overlays/static/css/tokens.css" />
    <link rel="stylesheet" href="/overlays/static/css/base.css" />
    <link rel="stylesheet" href="/overlays/static/css/scene.css" />
    <style>
      :root {
        --font-label: 30px;
        --font-title: 120px;
        --font-subtitle: 25px;
      }

      .title {
        letter-spacing: 0.05em;
        animation: breathe 2.5s ease-in-out infinite;
      }

      .subtitle { margin-top: 20px; }

      /* staggered dots use the same blink keyframe with delays */
      @keyframes blink {
        0%, 49%, 100% { opacity: 1; }
        50%            { opacity: 0; }
      }

      .dots span                  { animation: blink 1.5s step-end infinite; }
      .dots span:nth-child(2)     { animation-delay: 0.3s; }
      .dots span:nth-child(3)     { animation-delay: 0.6s; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="label">be right back</div>
      <div class="title">BRB</div>
      <div class="subtitle">
        back soon<span class="dots"><span>.</span><span>.</span><span>.</span></span>
      </div>
    </div>
  </body>
</html>
