<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── tokens: edit here to restyle the whole scene ── */
      :root {
        --color: #00ff41;
        --color-rgb: 0, 255, 65; /* channels for rgba() */

        --font-label: 30px; /* "BE RIGHT BACK" eyebrow */
        --font-title: 120px; /* BRB */
        --font-subtitle: 25px; /* "back soon..." */
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        font-family: "Share Tech Mono", "Courier New", monospace;
        color: var(--color);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 2px,
          rgba(0, 0, 0, 0.12) 2px,
          rgba(0, 0, 0, 0.12) 4px
        );
        pointer-events: none;
        z-index: 100;
      }

      .container {
        text-align: center;
      }

      .label {
        font-size: var(--font-label);
        letter-spacing: 0.45em;
        text-transform: uppercase;
        opacity: 0.45;
        margin-bottom: 18px;
      }

      .title {
        font-size: var(--font-title);
        letter-spacing: 0.05em;
        text-shadow:
          0 0 30px rgba(var(--color-rgb), 0.55),
          0 0 70px rgba(var(--color-rgb), 0.25);
        animation: breathe 2.5s ease-in-out infinite;
      }

      .subtitle {
        margin-top: 20px;
        font-size: var(--font-subtitle);
        letter-spacing: 0.35em;
        opacity: 0.4;
      }

      .dots span {
        animation: blink 1.5s step-end infinite;
      }
      .dots span:nth-child(2) {
        animation-delay: 0.3s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.6s;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        49% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      @keyframes breathe {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.65;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="label">be right back</div>
      <div class="title">BRB</div>
      <div class="subtitle">
        back soon<span class="dots"
          ><span>.</span><span>.</span><span>.</span></span
        >
      </div>
    </div>
  </body>
</html>
