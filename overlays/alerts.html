<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; font-family: "Inter", "Segoe UI", sans-serif; overflow: hidden; }

    #alert-container {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }

    .alert-card {
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 14px 24px;
      color: #fff;
      text-align: center;
      min-width: 300px;
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .alert-card.out {
      animation: slideOut 0.4s ease forwards;
    }

    .alert-card .type {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.6;
      margin-bottom: 4px;
    }

    .alert-card .headline {
      font-size: 22px;
      font-weight: 700;
    }

    .alert-card .sub-text {
      font-size: 14px;
      opacity: 0.75;
      margin-top: 4px;
    }

    /* Per-type accent colours */
    .alert-sub    { border-color: #9147ff; }
    .alert-resub  { border-color: #9147ff; }
    .alert-giftsub  { border-color: #bf94ff; }
    .alert-giftbomb { border-color: #bf94ff; }
    .alert-raid   { border-color: #ff6b35; }
    .alert-bits   { border-color: #f5c518; }
    .alert-channel_point { border-color: #00b5ad; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    @keyframes slideOut {
      to { opacity: 0; transform: translateY(-10px) scale(0.97); }
    }
  </style>
</head>
<body>
  <div id="alert-container"></div>

  <script src="/overlays/static/js/veil.js"></script>
  <script>
    const container = document.getElementById("alert-container");

    const LABELS = {
      sub:           "New Subscriber",
      resub:         "Resubscribed",
      giftsub:       "Gift Sub",
      giftbomb:      "Gift Bomb",
      raid:          "Incoming Raid",
      bits:          "Bits",
      channel_point: "Channel Point",
    };

    function buildHeadline(type, data) {
      switch (type) {
        case "sub":     return data.display_name;
        case "resub":   return `${data.display_name} · ${data.cumulative_months} months`;
        case "giftsub": return `${data.gifter_display_name} → ${data.recipient_display_name}`;
        case "giftbomb": return `${data.gifter_display_name} gifted ${data.count} subs!`;
        case "raid":    return `${data.from_display_name} — ${data.viewer_count} viewers`;
        case "bits":    return `${data.display_name} · ${data.bits} bits`;
        case "channel_point": return `${data.display_name} · ${data.reward_title}`;
        default:        return data.display_name || type;
      }
    }

    function buildSubText(type, data) {
      if (type === "resub" && data.message) return data.message;
      if (type === "bits"  && data.message) return data.message;
      if (type === "channel_point" && data.user_input) return data.user_input;
      return "";
    }

    function showAlert(data) {
      const type = data.alert_type;
      const card = document.createElement("div");
      card.className = `alert-card alert-${type}`;

      card.innerHTML = `
        <div class="type">${LABELS[type] || type}</div>
        <div class="headline">${buildHeadline(type, data)}</div>
        ${buildSubText(type, data) ? `<div class="sub-text">${buildSubText(type, data)}</div>` : ""}
      `;

      container.appendChild(card);

      setTimeout(() => {
        card.classList.add("out");
        setTimeout(() => card.remove(), 400);
      }, getDuration(type));
    }

    let alertsCfg = {};

    fetch("/config")
      .then(r => r.json())
      .then(cfg => { alertsCfg = cfg.alerts || {}; });

    function getDuration(type) {
      return (alertsCfg[type]?.duration ?? 3) * 1000;
    }

    createVeilSocket({
      "state.sync": (data) => { if (data.config) alertsCfg = data.config.alerts || {}; },
      "config.update": (data) => { alertsCfg = data.alerts || {}; },
      "alert.trigger": (data) => showAlert(data),
    });
  </script>
</body>
</html>
