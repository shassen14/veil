<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: transparent;
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 22px;
        overflow: hidden;
      }

      #chat {
        position: fixed;
        width: calc(100% - 20px);
        display: flex;
        flex-direction: column;
        gap: 3px;
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 22%);
        mask-image: linear-gradient(to bottom, transparent 0%, black 22%);
      }

      .msg {
        background: rgba(0, 0, 0, 0.50);
        border-left: 2px solid #00ff41;
        padding: 4px 10px;
        color: #ffffff;
        line-height: 1.5;
        word-break: break-word;
        animation: fadeIn 0.15s ease;
        transition: opacity 0.5s ease;
      }

      .msg::before {
        content: "> ";
        color: #00ff41;
        text-shadow: 0 0 7px rgba(0, 255, 65, 0.8);
      }

      .msg.fading {
        opacity: 0;
      }

      .msg .author {
        font-weight: normal;
        margin-right: 4px;
      }

      .msg .badge {
        display: inline-block;
        width: 16px;
        height: 16px;
        vertical-align: middle;
        margin-right: 3px;
      }

      .msg .emote {
        display: inline-block;
        height: 28px;
        width: auto;
        vertical-align: middle;
        margin: 0 1px;
      }

      .msg .source-icon {
        width: 16px;
        height: 16px;
        vertical-align: middle;
        margin-right: 5px;
        opacity: 0.8;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(-6px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      #chat.hidden {
        display: none;
      }

      /* Pending (held) messages */
      .msg.pending {
        border-left-color: #ff9f0a;
        opacity: 0.78;
      }

      .msg.pending::before {
        content: "> ";
        color: #ff9f0a;
        text-shadow: 0 0 7px rgba(255, 159, 10, 0.8);
      }

      .mod-actions {
        display: inline-flex;
        gap: 5px;
        margin-left: 10px;
        vertical-align: middle;
      }

      .mod-btn {
        cursor: pointer;
        padding: 1px 5px;
        border-radius: 2px;
        font-family: inherit;
        font-size: 0.8em;
        background: transparent;
        line-height: 1.4;
        pointer-events: auto;
      }

      .mod-btn.approve {
        border: 1px solid #00ff41;
        color: #00ff41;
      }

      .mod-btn.deny {
        border: 1px solid #ff453a;
        color: #ff453a;
      }
    </style>
  </head>
  <body>
    <div id="chat"></div>

    <script src="/overlays/static/js/veil.js"></script>
    <script>
      const chatEl = document.getElementById("chat");
      const messages = [];
      const messageMap = new Map(); // message_id → DOM element

      const urlParams = new URLSearchParams(window.location.search);
      const secret = urlParams.get("secret") || "";

      const POSITIONS = {
        "bottom-right": { bottom: "20px", right: "20px" },
        "bottom-left": { bottom: "20px", left: "20px" },
        "top-right": { top: "20px", right: "20px" },
        "top-left": { top: "20px", left: "20px" },
      };

      let MAX_MESSAGES = 20;
      let FADE_TIMEOUT = 0;

      // -----------------------------------------------------------------------
      // Emote support: populated server-side by boneless_couch via WebSocket
      // -----------------------------------------------------------------------
      const emoteMap = new Map(); // emoteName → imageUrl

      function applyEmotes(map) {
        emoteMap.clear();
        for (const [name, url] of Object.entries(map || {})) {
          emoteMap.set(name, url);
        }
      }

      function _emoteImg(src, alt) {
        const img = document.createElement('img');
        img.className = 'emote';
        img.src = src;
        img.alt = alt;
        return img;
      }

      function _appendWords(container, text) {
        for (const token of text.split(/(\s+)/)) {
          if (!token) continue;
          const url = emoteMap.get(token);
          container.appendChild(url ? _emoteImg(url, token) : document.createTextNode(token));
        }
      }

      function renderMessageContent(message, twitchEmotes) {
        const frag = document.createDocumentFragment();
        const replacements = [];
        for (const emote of (twitchEmotes || [])) {
          for (const pos of (emote.positions || [])) {
            const [s, e] = pos.split('-').map(Number);
            if (!isNaN(s) && !isNaN(e)) {
              replacements.push({ start: s, end: e, id: emote.id, name: message.slice(s, e + 1) });
            }
          }
        }
        replacements.sort((a, b) => a.start - b.start);

        let cursor = 0;
        for (const rep of replacements) {
          if (cursor < rep.start) _appendWords(frag, message.slice(cursor, rep.start));
          frag.appendChild(_emoteImg(
            `https://static-cdn.jtvnw.net/emoticons/v2/${rep.id}/default/dark/2.0`,
            rep.name,
          ));
          cursor = rep.end + 1;
        }
        if (cursor < message.length) _appendWords(frag, message.slice(cursor));
        return frag;
      }
      // -----------------------------------------------------------------------

      function applyConfig(cfg) {
        const chatCfg = cfg.chat || {};
        MAX_MESSAGES = chatCfg.max_messages ?? 20;
        FADE_TIMEOUT = chatCfg.fade_timeout ?? 0;
        const pos = POSITIONS[chatCfg.position] || POSITIONS["bottom-right"];
        Object.assign(chatEl.style, pos);
      }

      function userColor(name, twitchColor) {
        if (twitchColor) return twitchColor;
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
          hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        return `hsl(${Math.abs(hash) % 360}, 70%, 65%)`;
      }

      function _buildMessageEl(data) {
        const el = document.createElement("div");
        el.className = "msg";
        if (data.username) el.dataset.username = data.username;

        const color = userColor(data.display_name, data.color);

        if (data.source) {
          const icon = document.createElement("img");
          icon.className = "source-icon";
          icon.src = `/overlays/static/img/${data.source}.png`;
          icon.alt = data.source;
          el.appendChild(icon);
        }

        const author = document.createElement("span");
        author.className = "author";
        author.style.color = color;
        author.style.textShadow = `0 0 6px ${color}`;
        author.textContent = data.display_name + ":";

        el.appendChild(author);
        el.appendChild(document.createTextNode(' '));
        el.appendChild(renderMessageContent(data.message, data.emotes));
        return el;
      }

      function addMessage(data) {
        if (data.message_id && messageMap.has(data.message_id)) {
          return; // already present (e.g. pending message was approved)
        }

        const el = _buildMessageEl(data);
        chatEl.appendChild(el);

        if (data.message_id) {
          messageMap.set(data.message_id, el);
        }
        messages.push(el);

        if (messages.length > MAX_MESSAGES) {
          const old = messages.shift();
          if (old.dataset.id) messageMap.delete(old.dataset.id);
          old.remove();
        }

        if (FADE_TIMEOUT > 0) {
          setTimeout(() => {
            el.classList.add("fading");
            setTimeout(() => {
              el.remove();
              if (data.message_id) messageMap.delete(data.message_id);
              const idx = messages.indexOf(el);
              if (idx !== -1) messages.splice(idx, 1);
            }, 500);
          }, FADE_TIMEOUT * 1000);
        }
      }

      function addPendingMessage(data) {
        if (messageMap.has(data.message_id)) return;

        const el = _buildMessageEl(data);
        el.classList.add("pending");
        el.dataset.id = data.message_id;

        const actions = document.createElement("span");
        actions.className = "mod-actions";

        const approveBtn = document.createElement("button");
        approveBtn.className = "mod-btn approve";
        approveBtn.textContent = "✓";
        approveBtn.onclick = () => moderateMessage(data.message_id, "approve");

        const denyBtn = document.createElement("button");
        denyBtn.className = "mod-btn deny";
        denyBtn.textContent = "✗";
        denyBtn.onclick = () => moderateMessage(data.message_id, "reject");

        actions.appendChild(approveBtn);
        actions.appendChild(denyBtn);
        el.appendChild(actions);

        chatEl.appendChild(el);
        messageMap.set(data.message_id, el);
        messages.push(el);

        if (messages.length > MAX_MESSAGES) {
          const old = messages.shift();
          if (old.dataset.id) messageMap.delete(old.dataset.id);
          old.remove();
        }
      }

      function deleteMessage(id) {
        const el = messageMap.get(id);
        if (!el) return;
        el.classList.add("fading");
        setTimeout(() => {
          el.remove();
          messageMap.delete(id);
          const idx = messages.indexOf(el);
          if (idx !== -1) messages.splice(idx, 1);
        }, 500);
      }

      function clearUserMessages(username) {
        chatEl.querySelectorAll(`[data-username="${username}"]`).forEach(el => {
          const msgId = el.dataset.id;
          if (msgId) messageMap.delete(msgId);
          const idx = messages.indexOf(el);
          if (idx !== -1) messages.splice(idx, 1);
          el.remove();
        });
      }

      function moderateMessage(id, action) {
        fetch(`/modqueue/${id}/${action}`, {
          method: "POST",
          headers: { Authorization: "Bearer " + secret },
        }).catch(() => {});
      }

      function onModqueueDecision(data) {
        const el = messageMap.get(data.message_id);
        if (!el) return;
        if (data.decision === "approve") {
          el.classList.remove("pending");
          const actions = el.querySelector(".mod-actions");
          if (actions) actions.remove();
        } else {
          deleteMessage(data.message_id);
        }
      }

      fetch("/config").then((r) => r.json()).then(applyConfig);

      createVeilSocket({
        "state.sync": (data) => {
          if (data.config) applyConfig(data.config);
          if (!data.chat_visible) chatEl.classList.add("hidden");
          if (data.pending_messages) {
            data.pending_messages.forEach(addPendingMessage);
          }
          applyEmotes(data.emote_map);
        },
        "config.update": (data) => applyConfig(data),
        "emotes.update": (data) => applyEmotes(data),
        "chat.message": (data) => addMessage(data),
        "chat.message.delete": (data) => deleteMessage(data.message_id),
        "chat.clear_user": (data) => clearUserMessages(data.username),
        "modqueue.pending": (data) => addPendingMessage(data),
        "modqueue.decision": (data) => onModqueueDecision(data),
        "modqueue.resolved": (data) => deleteMessage(data.message_id),
        "overlay.toggle": (data) => {
          if (data.overlay === "chat") {
            chatEl.classList.toggle("hidden", !data.visible);
          }
        },
        "chat.source.toggle": (_data) => {
          // future: filter messages by platform
        },
      });
    </script>
  </body>
</html>
