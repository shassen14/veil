<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: transparent;
        font-family: "Share Tech Mono", "Courier New", monospace;
        font-size: 22px;
        overflow: hidden;
      }

      #chat {
        position: fixed;
        width: calc(100% - 20px);
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .msg {
        background: rgba(0, 8, 2, 0.88);
        border-left: 2px solid #00ff41;
        padding: 4px 10px;
        color: #b8ffb8;
        line-height: 1.5;
        word-break: break-word;
        animation: fadeIn 0.15s ease;
        transition: opacity 0.5s ease;
        text-shadow: 0 0 4px rgba(0, 255, 65, 0.3);
      }

      .msg::before {
        content: "> ";
        color: #00ff41;
        text-shadow: 0 0 7px rgba(0, 255, 65, 0.8);
      }

      .msg.fading {
        opacity: 0;
      }

      .msg .author {
        font-weight: normal;
        margin-right: 4px;
      }

      .msg .badge {
        display: inline-block;
        width: 16px;
        height: 16px;
        vertical-align: middle;
        margin-right: 3px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(-6px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      #chat.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="chat"></div>

    <script src="/overlays/static/js/veil.js"></script>
    <script>
      const chatEl = document.getElementById("chat");
      const messages = [];

      const POSITIONS = {
        "bottom-right": { bottom: "20px", right: "20px" },
        "bottom-left": { bottom: "20px", left: "20px" },
        "top-right": { top: "20px", right: "20px" },
        "top-left": { top: "20px", left: "20px" },
      };

      let MAX_MESSAGES = 20;
      let FADE_TIMEOUT = 0;

      function applyConfig(cfg) {
        const chatCfg = cfg.chat || {};
        MAX_MESSAGES = chatCfg.max_messages ?? 20;
        FADE_TIMEOUT = chatCfg.fade_timeout ?? 0;
        const pos = POSITIONS[chatCfg.position] || POSITIONS["bottom-right"];
        Object.assign(chatEl.style, pos);
      }

      function userColor(name, twitchColor) {
        if (twitchColor) return twitchColor;
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
          hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        return `hsl(${Math.abs(hash) % 360}, 70%, 65%)`;
      }

      function addMessage(data) {
        const el = document.createElement("div");
        el.className = "msg";

        const color = userColor(data.display_name, data.color);

        const author = document.createElement("span");
        author.className = "author";
        author.style.color = color;
        author.style.textShadow = `0 0 6px ${color}`;
        author.textContent = data.display_name + ":";

        const text = document.createTextNode(" " + data.message);

        el.appendChild(author);
        el.appendChild(text);
        chatEl.appendChild(el);
        messages.push(el);

        if (messages.length > MAX_MESSAGES) {
          const old = messages.shift();
          old.remove();
        }

        if (FADE_TIMEOUT > 0) {
          setTimeout(() => {
            el.classList.add("fading");
            setTimeout(() => el.remove(), 500);
          }, FADE_TIMEOUT * 1000);
        }
      }

      fetch("/config").then((r) => r.json()).then(applyConfig);

      createVeilSocket({
        "state.sync": (data) => {
          if (data.config) applyConfig(data.config);
          if (!data.chat_visible) chatEl.classList.add("hidden");
        },
        "config.update": (data) => applyConfig(data),
        "chat.message": (data) => addMessage(data),
        "overlay.toggle": (data) => {
          if (data.overlay === "chat") {
            chatEl.classList.toggle("hidden", !data.visible);
          }
        },
        "chat.source.toggle": (_data) => {
          // future: filter messages by platform
        },
      });
    </script>
  </body>
</html>
