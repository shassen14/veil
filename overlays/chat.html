<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/overlays/static/css/tokens.css" />
    <link rel="stylesheet" href="/overlays/static/css/base.css" />
    <style>
      body {
        background: transparent;
        font-family: var(--font-mono);
        font-size: 22px;
        overflow: hidden;
      }

      #chat {
        position: fixed;
        width: calc(100% - 20px);
        display: flex;
        flex-direction: column;
        gap: 3px;
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent 0%,
          black 22%
        );
        mask-image: linear-gradient(to bottom, transparent 0%, black 22%);
      }

      .msg {
        background: rgba(0, 0, 0, 0.5);
        border-left: 2px solid var(--color);
        padding: 4px 10px;
        color: #ffffff;
        line-height: 1.5;
        word-break: break-word;
        animation: fadeIn 0.15s ease;
        transition: opacity 0.5s ease;
      }

      /* chat.html slides in from the left */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(-6px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .msg::before {
        content: "> ";
        color: var(--color);
        text-shadow: 0 0 7px rgba(var(--color-rgb), 0.8);
      }

      .msg.fading {
        opacity: 0;
      }

      .msg .author {
        font-weight: normal;
        margin-right: 4px;
      }

      .msg .badge {
        display: inline-block;
        width: 16px;
        height: 16px;
        vertical-align: middle;
        margin-right: 3px;
      }

      .msg .emote {
        display: inline-block;
        height: 28px;
        width: auto;
        vertical-align: middle;
        margin: 0 1px;
      }

      .msg .source-icon {
        width: 20px;
        height: 20px;
        vertical-align: middle;
        margin-right: 5px;
        opacity: 0.8;
      }

      #chat.hidden {
        display: none;
      }

      .msg.pending {
        border-left-color: #ff9f0a;
        opacity: 0.78;
      }

      .msg.pending::before {
        content: "> ";
        color: #ff9f0a;
        text-shadow: 0 0 7px rgba(255, 159, 10, 0.8);
      }

      .mod-actions {
        display: inline-flex;
        gap: 5px;
        margin-left: 10px;
        vertical-align: middle;
      }

      .mod-btn {
        cursor: pointer;
        padding: 1px 5px;
        border-radius: 2px;
        font-family: inherit;
        font-size: 0.8em;
        background: transparent;
        line-height: 1.4;
        pointer-events: auto;
      }

      .mod-btn.approve {
        border: 1px solid var(--color);
        color: var(--color);
      }
      .mod-btn.deny {
        border: 1px solid #ff453a;
        color: #ff453a;
      }
    </style>
  </head>
  <body>
    <div id="chat"></div>

    <script src="/overlays/static/js/veil.js"></script>
    <script src="/overlays/static/js/chat.js"></script>
    <script>
      const chatEl = document.getElementById("chat");
      const urlParams = new URLSearchParams(window.location.search);
      const secret = urlParams.get("secret") || "";

      const POSITIONS = {
        "bottom-right": { bottom: "20px", right: "20px" },
        "bottom-left": { bottom: "20px", left: "20px" },
        "top-right": { top: "20px", right: "20px" },
        "top-left": { top: "20px", left: "20px" },
      };

      const chat = createChatManager(chatEl, {
        chatSources: { twitch: true, youtube: true },
      });

      function applyConfig(cfg) {
        chat.applyConfig(cfg);
        const pos = POSITIONS[cfg?.chat?.position] || POSITIONS["bottom-right"];
        Object.assign(chatEl.style, pos);
      }

      function addPendingMessage(data) {
        if (chat.messageMap.has(data.message_id)) return;

        const el = buildMessageEl(data);
        el.classList.add("pending");

        const actions = document.createElement("span");
        actions.className = "mod-actions";

        const approveBtn = document.createElement("button");
        approveBtn.className = "mod-btn approve";
        approveBtn.textContent = "✓";
        approveBtn.onclick = () => moderateMessage(data.message_id, "approve");

        const denyBtn = document.createElement("button");
        denyBtn.className = "mod-btn deny";
        denyBtn.textContent = "✗";
        denyBtn.onclick = () => moderateMessage(data.message_id, "reject");

        actions.appendChild(approveBtn);
        actions.appendChild(denyBtn);
        el.appendChild(actions);

        chatEl.appendChild(el);
        chat.track(el, data.message_id);
      }

      function moderateMessage(id, action) {
        fetch(`/modqueue/${id}/${action}`, {
          method: "POST",
          headers: { Authorization: "Bearer " + secret },
        }).catch(() => {});
      }

      function onModqueueDecision(data) {
        const el = chat.messageMap.get(data.message_id);
        if (!el) return;
        if (data.decision === "approve") {
          el.classList.remove("pending");
          el.querySelector(".mod-actions")?.remove();
        } else {
          chat.deleteMessage(data.message_id);
        }
      }

      fetch("/config")
        .then((r) => r.json())
        .then(applyConfig);

      createVeilSocket({
        "state.sync": (data) => {
          if (data.config) applyConfig(data.config);
          if (!data.chat_visible) chatEl.classList.add("hidden");
          if (data.chat_sources)
            Object.entries(data.chat_sources).forEach(([p, v]) => chat.setChatSource(p, v));
          if (data.pending_messages)
            data.pending_messages.forEach(addPendingMessage);
          applyEmotes(data.emote_map);
        },
        "config.update":          (data) => applyConfig(data),
        "emotes.update":          (data) => applyEmotes(data),
        "chat.message":           (data) => chat.addMessage(data),
        "chat.message.delete":    (data) => chat.deleteMessage(data.message_id),
        "chat.clear_user":        (data) => chat.clearUserMessages(data.username),
        "modqueue.pending":       (data) => addPendingMessage(data),
        "modqueue.decision":      (data) => onModqueueDecision(data),
        "modqueue.resolved":      (data) => chat.deleteMessage(data.message_id),
        "overlay.toggle": (data) => {
          if (data.overlay === "chat")
            chatEl.classList.toggle("hidden", !data.visible);
        },
        "chat.source.toggle": (data) => chat.setChatSource(data.platform, data.enabled),
      });
    </script>
  </body>
</html>
